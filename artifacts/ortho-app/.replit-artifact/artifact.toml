kind = "web"
previewPath = "/"
title = "Orthodontic Treatment Platform"
version = "1.0.0"
id = "artifacts/ortho-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25808

[services.development]
run = "pnpm --filter @workspace/ortho-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ortho-app", "run", "build" ]
publicDir = "artifacts/ortho-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25808"
BASE_PATH = "/"
