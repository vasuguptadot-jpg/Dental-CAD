kind = "mobile"
previewPath = "/ortho-mobile/"
title = "OrthoVision Mobile"
version = "1.0.0"
id = "artifacts/ortho-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/ortho-mobile/" ]
localPort = 21633

[services.development]
run = "pnpm --filter @workspace/ortho-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ortho-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/ortho-mobile", "run", "serve" ]

[services.env]
PORT = "21633"
BASE_PATH = "/ortho-mobile/"
