kind = "web"
previewPath = "/security-analyzer/"
title = "Security Analyzer"
version = "1.0.0"
id = "artifacts/security-analyzer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/security-analyzer/" ]
localPort = 23881

[services.development]
run = "pnpm --filter @workspace/security-analyzer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/security-analyzer", "run", "build" ]
publicDir = "artifacts/security-analyzer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23881"
BASE_PATH = "/security-analyzer/"
