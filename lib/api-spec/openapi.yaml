openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Orthodontic Treatment Planning Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: patients
    description: Patient management
  - name: cases
    description: Orthodontic case management
  - name: scans
    description: 3D scan file management
  - name: dashboard
    description: Dashboard analytics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Doctor login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Doctor"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /patients:
    get:
      operationId: listPatients
      tags: [patients]
      summary: List patients with optional search
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of patients
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientListResponse"
    post:
      operationId: createPatient
      tags: [patients]
      summary: Create a new patient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"

  /patients/{id}:
    get:
      operationId: getPatient
      tags: [patients]
      summary: Get a patient by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updatePatient
      tags: [patients]
      summary: Update a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientUpdate"
      responses:
        "200":
          description: Updated patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deletePatient
      tags: [patients]
      summary: Delete a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /cases:
    get:
      operationId: listCases
      tags: [cases]
      summary: List orthodontic cases
      parameters:
        - name: patientId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of cases
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseListResponse"
    post:
      operationId: createCase
      tags: [cases]
      summary: Create a new orthodontic case
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaseInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrthoCase"

  /cases/{id}:
    get:
      operationId: getCase
      tags: [cases]
      summary: Get a case by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Case
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrthoCase"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateCase
      tags: [cases]
      summary: Update a case
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaseUpdate"
      responses:
        "200":
          description: Updated case
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrthoCase"
    delete:
      operationId: deleteCase
      tags: [cases]
      summary: Delete a case
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /cases/{id}/status:
    patch:
      operationId: updateCaseStatus
      tags: [cases]
      summary: Update case treatment status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaseStatusUpdate"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrthoCase"

  /scans/upload:
    post:
      operationId: uploadScan
      tags: [scans]
      summary: Upload a 3D scan file (STL, OBJ, PLY) via multipart/form-data
      responses:
        "201":
          description: Scan uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scan"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scans:
    get:
      operationId: listScans
      tags: [scans]
      summary: List scans, optionally filtered by case
      parameters:
        - name: caseId
          in: query
          schema:
            type: integer
        - name: patientId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of scans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Scan"

  /scans/{id}:
    get:
      operationId: getScan
      tags: [scans]
      summary: Get scan metadata
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Scan metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scan"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteScan
      tags: [scans]
      summary: Delete a scan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /scans/{id}/file:
    get:
      operationId: getScanFile
      tags: [scans]
      summary: Stream the raw scan file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Binary scan file
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/case-distribution:
    get:
      operationId: getCaseDistribution
      tags: [dashboard]
      summary: Get case status distribution for charts
      responses:
        "200":
          description: Case distribution by status
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CaseStatusCount"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    Doctor:
      type: object
      required: [id, email, name, role]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string

    AuthResponse:
      type: object
      required: [doctor]
      properties:
        doctor:
          $ref: "#/components/schemas/Doctor"

    Patient:
      type: object
      required: [id, patientCode, fullName, age, gender, mobileNumber, createdAt]
      properties:
        id:
          type: integer
        patientCode:
          type: string
        fullName:
          type: string
        age:
          type: integer
        gender:
          type: string
        mobileNumber:
          type: string
        email:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    PatientDetail:
      type: object
      required: [id, patientCode, fullName, age, gender, mobileNumber, createdAt, cases]
      properties:
        id:
          type: integer
        patientCode:
          type: string
        fullName:
          type: string
        age:
          type: integer
        gender:
          type: string
        mobileNumber:
          type: string
        email:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
        cases:
          type: array
          items:
            $ref: "#/components/schemas/OrthoCase"

    PatientInput:
      type: object
      required: [fullName, age, gender, mobileNumber]
      properties:
        fullName:
          type: string
          minLength: 1
        age:
          type: integer
          minimum: 0
          maximum: 120
        gender:
          type: string
          enum: [male, female, other]
        mobileNumber:
          type: string
        email:
          type: string
        address:
          type: string
        notes:
          type: string

    PatientUpdate:
      type: object
      properties:
        fullName:
          type: string
        age:
          type: integer
        gender:
          type: string
        mobileNumber:
          type: string
        email:
          type: string
        address:
          type: string
        notes:
          type: string

    PatientListResponse:
      type: object
      required: [patients, total, page, limit]
      properties:
        patients:
          type: array
          items:
            $ref: "#/components/schemas/Patient"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    OrthoCase:
      type: object
      required: [id, caseCode, patientId, status, createdAt]
      properties:
        id:
          type: integer
        caseCode:
          type: string
        patientId:
          type: integer
        patientName:
          type: ["string", "null"]
        title:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [new, scan_uploaded, analysis_completed, treatment_planning, approved, manufacturing]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    CaseInput:
      type: object
      required: [patientId, title]
      properties:
        patientId:
          type: integer
        title:
          type: string
        description:
          type: string
        notes:
          type: string

    CaseUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [new, scan_uploaded, analysis_completed, treatment_planning, approved, manufacturing]
        notes:
          type: string

    CaseStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [new, scan_uploaded, analysis_completed, treatment_planning, approved, manufacturing]

    CaseListResponse:
      type: object
      required: [cases, total, page, limit]
      properties:
        cases:
          type: array
          items:
            $ref: "#/components/schemas/OrthoCase"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    DashboardStats:
      type: object
      required: [totalPatients, activeCases, newCasesThisMonth, approvedCases, manufacturingCases, completionRate]
      properties:
        totalPatients:
          type: integer
        activeCases:
          type: integer
        newCasesThisMonth:
          type: integer
        approvedCases:
          type: integer
        manufacturingCases:
          type: integer
        completionRate:
          type: number

    ActivityItem:
      type: object
      required: [id, type, description, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [patient_created, case_created, status_changed, patient_updated]
        description:
          type: string
        patientName:
          type: ["string", "null"]
        caseCode:
          type: ["string", "null"]
        createdAt:
          type: string

    Scan:
      type: object
      required: [id, caseId, patientId, filename, originalName, fileType, fileSize, jawType, createdAt]
      properties:
        id:
          type: integer
        caseId:
          type: integer
        patientId:
          type: integer
        filename:
          type: string
        originalName:
          type: string
        fileType:
          type: string
        fileSize:
          type: integer
        jawType:
          type: string
          enum: [upper, lower, full, unknown]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    CaseStatusCount:
      type: object
      required: [status, count, label]
      properties:
        status:
          type: string
        count:
          type: integer
        label:
          type: string
